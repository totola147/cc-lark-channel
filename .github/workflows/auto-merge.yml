name: Auto Merge

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  auto-merge:
    runs-on: self-hosted
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Find and merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the PR associated with this workflow run
          PR_NUMBER=$(gh api repos/${{ github.repository }}/pulls \
            --jq ".[] | select(.head.sha == \"${{ github.event.workflow_run.head_sha }}\") | .number" \
            2>/dev/null | head -1)

          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR found for SHA ${{ github.event.workflow_run.head_sha }}"
            exit 0
          fi

          PR_AUTHOR=$(gh pr view "$PR_NUMBER" --repo ${{ github.repository }} --json author --jq '.author.login')
          if [ "$PR_AUTHOR" != "totola147" ]; then
            echo "PR #$PR_NUMBER by $PR_AUTHOR — skipping (not owner)"
            exit 0
          fi

          echo "Merging PR #$PR_NUMBER"
          gh pr merge "$PR_NUMBER" --repo ${{ github.repository }} --squash --delete-branch
