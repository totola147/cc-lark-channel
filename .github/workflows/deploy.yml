name: Deploy

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    runs-on: self-hosted
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Record previous commit for rollback
        id: prev
        run: |
          if [ -f /opt/cc-lark-channel/dist/index.cjs ]; then
            echo "commit=$(git -C /opt/cc-lark-channel rev-parse HEAD 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          else
            echo "commit=" >> $GITHUB_OUTPUT
          fi

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Deploy to /opt/cc-lark-channel
        run: |
          sudo rsync -a --delete --exclude='.env' --exclude='config.toml' --exclude='node_modules' --exclude='.git' ./ /opt/cc-lark-channel/
          cd /opt/cc-lark-channel
          npm ci --omit=dev

      - name: Restart service
        run: |
          cd /opt/cc-lark-channel
          set -a && source .env && set +a
          export CLC_CONFIG=/opt/cc-lark-channel/config.toml
          pm2 delete cc-lark-channel 2>/dev/null || true
          pm2 start dist/index.cjs --name cc-lark-channel --update-env
          pm2 save

      - name: Health check
        id: health
        run: |
          HEALTHY=false
          for i in $(seq 1 10); do
            sleep 2
            STATUS=$(pm2 jlist 2>/dev/null | python3 -c "
          import json, sys
          try:
            data = json.load(sys.stdin)
            for p in data:
              if p.get('name') == 'cc-lark-channel':
                print(p.get('pm2_env',{}).get('status',''))
                break
          except: print('unknown')
          " 2>/dev/null || echo "unknown")
            echo "  Check $i/10: $STATUS"
            if [ "$STATUS" = "online" ]; then
              HEALTHY=true
              break
            fi
            if [ "$STATUS" = "errored" ] || [ "$STATUS" = "stopped" ]; then
              break
            fi
          done
          echo "healthy=$HEALTHY" >> $GITHUB_OUTPUT
          if [ "$HEALTHY" != "true" ]; then
            echo "Health check failed"
            pm2 logs cc-lark-channel --lines 20 --nostream || true
            exit 1
          fi

      - name: Rollback on failure
        if: failure() && steps.prev.outputs.commit != ''
        run: |
          echo "Rolling back to ${{ steps.prev.outputs.commit }}"
          cd /opt/cc-lark-channel
          git init . 2>/dev/null || true
          git fetch origin ${{ steps.prev.outputs.commit }} --depth=1
          git checkout ${{ steps.prev.outputs.commit }} -- .
          npm ci --omit=dev
          pm2 restart cc-lark-channel
          echo "Rollback complete"

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            git log --pretty=format:"- %s (%h)" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          generate_release_notes: true
